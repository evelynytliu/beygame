<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Spinner: Ultimate Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        :root {
            --primary: #00f3ff;
            --secondary: #ff0055;
            --bg: #050510;
            --panel: rgba(10, 10, 20, 0.95);
            --border: rgba(0, 243, 255, 0.3);
        }

        body { margin: 0; overflow: hidden; background-color: var(--bg); font-family: 'Roboto', sans-serif; color: white; touch-action: none; user-select: none; }
        #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .screen {
            pointer-events: auto; background: var(--panel); backdrop-filter: blur(12px); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 0 40px rgba(0, 243, 255, 0.15); max-width: 90%; width: 420px; max-height: 95vh; overflow-y: auto; transition: all 0.3s ease;
        }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); text-shadow: 0 0 10px var(--primary); margin: 0 0 0.5rem 0; font-size: 1.8rem; }
        p { color: #aaa; font-size: 0.85rem; margin-bottom: 1rem; }
        
        .canvas-container { position: relative; display: inline-block; margin-bottom: 0.5rem; }
        #draw-canvas { background: #000; border: 2px dashed var(--primary); border-radius: 10px; cursor: crosshair; touch-action: none; }
        
        .btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 10px 25px; font-family: 'Orbitron', sans-serif; font-size: 1rem; cursor: pointer; transition: 0.3s; margin: 5px; border-radius: 4px; text-transform: uppercase; }
        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        .btn.secondary { border-color: var(--secondary); color: var(--secondary); }
        .btn.secondary:hover { background: var(--secondary); color: white; box-shadow: 0 0 20px var(--secondary); }

        .colors { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .color-swatch.active { border-color: white; box-shadow: 0 0 10px white; transform: scale(1.1); }

        .tool-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .tool-btn { font-size: 0.8rem; padding: 6px 12px; border: 1px solid #444; color: #ccc; background: rgba(255,255,255,0.05); cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 5px; }
        .tool-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: bold; }

        .size-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 0.8rem; color: #aaa; }
        .size-control input { width: 100px; accent-color: var(--primary); }

        .tuning-group { text-align: left; margin-bottom: 8px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 5px; }
        .tuning-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #ccc; }
        .tuning-val { color: var(--primary); font-family: monospace; }
        input[type=range] { width: 100%; margin: 5px 0; accent-color: var(--primary); cursor: pointer; }

        /* Combat Power Display */
        .cp-container { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .cp-title { font-size: 0.9rem; color: #aaa; letter-spacing: 1px; margin-bottom: 5px; }
        .cp-value { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: #ffaa00; text-shadow: 0 0 15px rgba(255, 170, 0, 0.5); font-weight: bold; }

        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; font-family: 'Orbitron', sans-serif; z-index: 20; }
        .hud-text { text-shadow: 0 0 5px black; font-weight: bold; letter-spacing: 1px; }
        .hidden { display: none !important; }
        
        #msg-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px white; z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap; }

        /* Launch UI */
        #launch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 25;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            padding-bottom: 50px; pointer-events: none;
        }
        #launch-handle-zone {
            width: 120px; height: 120px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; cursor: grab;
            transition: transform 0.1s;
        }
        #launch-handle-zone:active { cursor: grabbing; border-color: var(--primary); }
        .ripcord-knob { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 20px var(--primary); }
        .launch-instruction { color: white; font-family: 'Orbitron'; margin-bottom: 20px; text-shadow: 0 0 5px black; font-size: 1.2rem; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="game-canvas"></div>
    <div id="msg-overlay">READY</div>

    <div id="hud" class="hidden">
        <div class="hud-text" style="color:var(--primary)">YOU</div>
        <div class="hud-text" style="color:var(--secondary)">ENEMY LV.<span id="hud-lvl">1</span></div>
    </div>

    <!-- Launch UI -->
    <div id="launch-overlay" class="hidden">
        <div class="launch-instruction">下拉手把發射！ (Pull & Release)</div>
        <div id="launch-handle-zone">
            <div class="ripcord-knob"></div>
        </div>
    </div>

    <div id="ui-layer">
        <!-- Draw Screen -->
        <div id="screen-draw" class="screen">
            <h1>創作你的陀螺</h1>
            
            <div class="colors">
                <div class="color-swatch active" style="background:#00f3ff" onclick="setColor(0x00f3ff, this)"></div>
                <div class="color-swatch" style="background:#ff0055" onclick="setColor(0xff0055, this)"></div>
                <div class="color-swatch" style="background:#ffff00" onclick="setColor(0xffff00, this)"></div>
                <div class="color-swatch" style="background:#00ff88" onclick="setColor(0x00ff88, this)"></div>
                <div class="color-swatch" style="background:#ffffff" onclick="setColor(0xffffff, this)"></div>
            </div>

            <div class="tool-bar">
                <div class="tool-btn active" id="tool-pen" onclick="setTool('pen')">✏️ 畫筆</div>
                <div class="tool-btn" id="tool-fill" onclick="setTool('fill')">🪣 填色</div>
                <div class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">🧹 擦除</div>
                <div class="tool-btn" onclick="clearCanvas()">❌ 清空</div>
            </div>

            <div class="size-control">
                <span>筆畫粗細</span>
                <input type="range" min="2" max="40" value="10" oninput="updateBrushSize(this.value)">
                <span id="brush-size-val">10</span>
            </div>

            <div class="canvas-container">
                <canvas id="draw-canvas" width="300" height="300"></canvas>
            </div>
            
            <button class="btn" onclick="finishDrawing()">完成設計</button>
        </div>

        <!-- Level & Tuning Screen -->
        <div id="screen-level" class="screen hidden">
            <h1>陀螺分析報告</h1>
            
            <!-- New CP Display -->
            <div class="cp-container">
                <div class="cp-title">戰鬥力 (COMBAT POWER)</div>
                <div class="cp-value" id="stat-cp">0</div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; color: #aaa; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
                <div>重量: <span id="stat-mass" style="color:white">--</span></div>
                <div>範圍: <span id="stat-radius" style="color:white">--</span></div>
                <div>持久: <span id="stat-stamina" style="color:var(--primary)">--</span></div>
            </div>
            
            <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; margin-bottom:10px;">
                <h3 style="margin-top:0;">敵人等級</h3>
                <div class="tuning-label"><span>ENEMY LEVEL</span><span class="tuning-val" id="lvl-val">1</span></div>
                <input type="range" min="1" max="10" value="1" oninput="updateLevel(this.value)" style="accent-color: var(--secondary);">
            </div>

            <h3 style="color:var(--primary);">物理參數調整</h3>
            
            <div class="tuning-group">
                <div class="tuning-label"><span>牆壁反彈力 (Wall Bounce)</span><span class="tuning-val" id="val-elast">0.8</span></div>
                <input type="range" min="0.1" max="2.0" step="0.1" value="0.8" oninput="updateSetting('restitution', this.value, 'val-elast')">
            </div>

            <div class="tuning-group">
                <div class="tuning-label"><span>攻擊爆發力 (Impact)</span><span class="tuning-val" id="val-force">1.2</span></div>
                <input type="range" min="0.5" max="3.0" step="0.1" value="1.2" oninput="updateSetting('forceMult', this.value, 'val-force')">
            </div>

            <div style="margin-top:15px;">
                <button class="btn" onclick="goToLaunch()">進入戰鬥場</button>
                <button class="btn secondary" onclick="backToDraw()">修改圖案</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="screen hidden">
            <h1 id="result-title">VICTORY</h1>
            <p id="result-sub">結果</p>
            <button class="btn" onclick="goToLaunch()">再次挑戰</button>
            <button class="btn secondary" onclick="backToDraw()">畫新的</button>
        </div>
    </div>

<script>
    // --- Audio System ---
    const AudioSys = {
        ctx: null,
        init: function() {
            if (!this.ctx) {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
            }
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playTone: function(freq, type, dur, vol=0.1) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + dur);
        },
        playClick: function() { this.init(); this.playTone(600, 'sine', 0.1, 0.05); },
        playCharge: function(pitch) { this.playTone(200 + pitch * 3, 'sawtooth', 0.1, 0.1); },
        playGo: function() { this.playTone(800, 'square', 0.6, 0.1); },
        playHit: function(intensity) {
            if (!this.ctx) return;
            const vol = Math.min(Math.max(intensity * 0.1, 0.1), 0.5);
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); osc.type = 'square'; osc.frequency.value = 80 + Math.random() * 40; 
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(t); osc.stop(t+0.2);
        },
        playWall: function() { this.playTone(300, 'sine', 0.1, 0.1); },
        playWin: function() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => this.playTone(f, 'triangle', 0.4, 0.2), i * 150)); },
        playLose: function() { [440, 415, 392, 349].forEach((f, i) => setTimeout(() => this.playTone(f, 'sawtooth', 0.5, 0.2), i * 200)); }
    };

    // --- Config & State ---
    let settings = { restitution: 0.8, forceMult: 1.2, gravity: 1.0 };
    let state = { screen: 'DRAW', level: 1, pColor: '#00f3ff', pTool: 'pen', pBrushSize: 10, pStats: { mass: 1, friction: 0.996, radius: 1 }, roundStartTime: 0 };
    
    let scene, camera, renderer, arenaMesh, barrierMesh;
    let playerMesh, enemyMesh;
    let playerGroups = { root: null, tilt: null, spin: null };
    let enemyGroups = { root: null, tilt: null, spin: null };

    let particles = [], objects = [];
    
    // Increased Arena Size (36 -> 42)
    const ARENA_RADIUS = 42;
    const BOWL_RADIUS = ARENA_RADIUS * 1.6; // Slightly flatter relative to size, but still deep due to size
    const MAX_SPIN = 0.9; 

    const drawCanvas = document.getElementById('draw-canvas');
    const ctx = drawCanvas.getContext('2d');
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    // Launch Vars
    let launchStartY = 0;
    let launchPower = 0;
    let isCharging = false;

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, input, .color-swatch, .tool-btn').forEach(el => el.addEventListener('click', () => AudioSys.playClick()));
        setupLaunchControls();
    });

    window.onload = () => { initThreeJS(); initDrawing(); animate(); };

    // --- Launch System ---
    function setupLaunchControls() {
        const handle = document.getElementById('launch-handle-zone');
        const startCharge = (e) => {
            isCharging = true;
            launchStartY = e.touches ? e.touches[0].clientY : e.clientY;
            AudioSys.init();
        };
        const moveCharge = (e) => {
            if(!isCharging) return;
            e.preventDefault();
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const delta = Math.max(0, y - launchStartY);
            launchPower = Math.min(delta / 200, 1.0); 
            
            handle.style.transform = `translateY(${delta * 0.5}px) scale(${1 + launchPower * 0.2})`;
            if (Math.random() > 0.8) AudioSys.playCharge(launchPower * 100);
        };
        const endCharge = () => {
            if(!isCharging) return;
            isCharging = false;
            handle.style.transform = 'translateY(0) scale(1)';
            if (launchPower > 0.2) startRound(launchPower);
            else launchPower = 0;
        };

        handle.addEventListener('mousedown', startCharge);
        window.addEventListener('mousemove', moveCharge);
        window.addEventListener('mouseup', endCharge);
        handle.addEventListener('touchstart', startCharge, {passive: false});
        window.addEventListener('touchmove', moveCharge, {passive: false});
        window.addEventListener('touchend', endCharge);
    }

    function goToLaunch() {
        AudioSys.init();
        switchScreen(null);
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('hud-lvl').innerText = state.level;
        document.getElementById('launch-overlay').classList.remove('hidden');
        resetSceneForLaunch();
        showMsg("READY", 0, "white");
    }

    // --- Logic ---
    function updateLevel(val) { state.level = parseInt(val); document.getElementById('lvl-val').innerText = state.level; }
    function updateSetting(key, val, labelId) { settings[key] = parseFloat(val); if(labelId) document.getElementById(labelId).innerText = settings[key]; }

    function initThreeJS() {
        const container = document.getElementById('game-canvas');
        scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x050510, 0.012); // Less fog for larger arena
        // Camera further back for 42 radius
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(0, 85, 120); 
        camera.lookAt(0, 0, 0);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1); dirLight.position.set(10, 30, 10); scene.add(dirLight);

        // Arena
        const bowlGeo = new THREE.SphereGeometry(BOWL_RADIUS, 64, 32, 0, Math.PI * 2, 0, 0.35);
        const bowlMat = new THREE.MeshPhongMaterial({ color: 0x111116, emissive: 0x050510, specular: 0x444444, shininess: 40, side: THREE.DoubleSide });
        arenaMesh = new THREE.Mesh(bowlGeo, bowlMat);
        arenaMesh.rotation.x = Math.PI; 
        arenaMesh.position.y = BOWL_RADIUS - 2.0;
        scene.add(arenaMesh);

        const grid = new THREE.PolarGridHelper(ARENA_RADIUS, 16, 8, 64, 0x00f3ff, 0x222222);
        grid.position.y = 0.1; scene.add(grid);
        
        // Physical Wall Visual
        const wallGeo = new THREE.CylinderGeometry(ARENA_RADIUS, ARENA_RADIUS, 8, 64, 1, true);
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.2, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
        barrierMesh = new THREE.Mesh(wallGeo, wallMat);
        barrierMesh.position.y = 4.0;
        scene.add(barrierMesh);
        
        // Wall Ring Top
        const ringGeo = new THREE.TorusGeometry(ARENA_RADIUS, 0.3, 16, 100);
        scene.add(new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0x00f3ff })).rotateX(Math.PI/2).translateY(8));
    }

    // --- Drawing Logic ---
    function initDrawing() {
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; 
        ctx.lineWidth = state.pBrushSize; 
        ctx.strokeStyle = state.pColor;
        
        const d = drawCanvas;
        d.addEventListener('mousedown', startAction); d.addEventListener('mousemove', moveAction); d.addEventListener('mouseup', stopAction); d.addEventListener('mouseout', stopAction);
        d.addEventListener('touchstart', (e) => startAction(e.touches[0]), {passive: false}); d.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e.touches[0]); }, {passive: false}); d.addEventListener('touchend', stopAction);
        clearCanvas();
    }
    
    function updateBrushSize(val) {
        state.pBrushSize = parseInt(val);
        document.getElementById('brush-size-val').innerText = val;
        ctx.lineWidth = val;
    }

    function getPos(e) { const r = drawCanvas.getBoundingClientRect(); return { x: Math.floor(e.clientX - r.left), y: Math.floor(e.clientY - r.top) }; }
    
    function startAction(e) {
        const p = getPos(e);
        if (state.pTool === 'fill') {
            floodFill(p.x, p.y, state.pColor);
        } else {
            isDrawing = true; lastX = p.x; lastY = p.y;
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(lastX, lastY); ctx.stroke();
        }
    }
    function moveAction(e) {
        if (!isDrawing || state.pTool === 'fill') return;
        const p = getPos(e);
        ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
        lastX = p.x; lastY = p.y;
    }
    function stopAction() { isDrawing = false; }
    
    function clearCanvas() { 
        ctx.clearRect(0,0,300,300); 
        ctx.save(); 
        ctx.strokeStyle = '#222'; ctx.lineWidth = 1; 
        ctx.beginPath(); ctx.moveTo(150,0); ctx.lineTo(150,300); ctx.moveTo(0,150); ctx.lineTo(300,150); ctx.stroke(); 
        ctx.beginPath(); ctx.arc(150,150,100,0,Math.PI*2); ctx.stroke(); 
        ctx.restore(); 
        // Reset context state
        ctx.lineWidth = state.pBrushSize;
        ctx.strokeStyle = state.pColor;
    }

    function setColor(hex, el) { 
        state.pColor = '#' + hex.toString(16).padStart(6,'0'); 
        if(state.pTool === 'pen') ctx.strokeStyle = state.pColor;
        document.querySelectorAll('.color-swatch').forEach(c => c.classList.remove('active')); 
        el.classList.add('active'); 
    }

    function setTool(tool) { 
        state.pTool = tool; 
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); 
        document.getElementById('tool-'+tool).classList.add('active'); 
        
        if(tool === 'eraser') { 
            ctx.globalCompositeOperation = 'destination-out'; 
        } else { 
            ctx.globalCompositeOperation = 'source-over'; 
            if(tool === 'pen') ctx.strokeStyle = state.pColor;
        } 
    }

    // Simple Flood Fill
    function floodFill(startX, startY, fillColor) {
        const width = 300, height = 300;
        const imgData = ctx.getImageData(0, 0, width, height);
        const data = imgData.data;
        
        const hexToRgb = (hex) => {
            const bigint = parseInt(hex.slice(1), 16);
            return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
        };
        const [fr, fg, fb] = hexToRgb(fillColor);
        
        const getPx = (x, y) => (y * width + x) * 4;
        const startIdx = getPx(startX, startY);
        const startR = data[startIdx], startG = data[startIdx+1], startB = data[startIdx+2], startA = data[startIdx+3];

        // Don't fill if same color
        if (startR === fr && startG === fg && startB === fb && startA === 255) return;

        // Tolerance for anti-aliased edges
        const match = (idx) => {
            const dr = Math.abs(data[idx] - startR);
            const dg = Math.abs(data[idx+1] - startG);
            const db = Math.abs(data[idx+2] - startB);
            const da = Math.abs(data[idx+3] - startA);
            return (dr+dg+db+da) < 50; // Tolerance
        };

        const stack = [[startX, startY]];
        while (stack.length) {
            const [x, y] = stack.pop();
            const idx = getPx(x, y);
            
            if (match(idx)) {
                data[idx] = fr; data[idx+1] = fg; data[idx+2] = fb; data[idx+3] = 255;
                if (x > 0) stack.push([x - 1, y]);
                if (x < width - 1) stack.push([x + 1, y]);
                if (y > 0) stack.push([x, y - 1]);
                if (y < height - 1) stack.push([x, y + 1]);
            }
        }
        ctx.putImageData(imgData, 0, 0);
    }
    
    function finishDrawing() {
        const d = ctx.getImageData(0, 0, 300, 300).data; 
        let pc = 0; 
        let minX=300, maxX=0, minY=300, maxY=0;
        let totalDistSq = 0; // For Moment of Inertia
        const cx = 150, cy = 150;

        for(let i=0; i<d.length; i+=4) { 
            if(d[i+3]>20) { 
                pc++; 
                const x=(i/4)%300, y=Math.floor((i/4)/300); 
                minX=Math.min(minX,x); maxX=Math.max(maxX,x); minY=Math.min(minY,y); maxY=Math.max(maxY,y); 
                
                const dx = x - cx;
                const dy = y - cy;
                totalDistSq += (dx*dx + dy*dy);
            } 
        }
        if (pc < 50) { showMsg("太少了! 多畫一點!", 1000, "red"); return; }
        
        state.pStats.mass = Math.min(1.0 + (pc / 6000), 6.0); 
        state.pStats.radius = Math.max(1.0, Math.max(maxX-minX, maxY-minY)/2 * 0.04);
        
        // PHYSICS: Moment of Inertia (Rotational Stamina)
        const inertia = totalDistSq;
        let rawFric = 0.990 + (Math.log10(inertia + 1) - 5) * 0.0035; 
        let friction = Math.min(Math.max(rawFric, 0.991), 0.999); 
        
        state.pStats.friction = friction;

        document.getElementById('stat-mass').innerText = state.pStats.mass.toFixed(1); 
        document.getElementById('stat-radius').innerText = state.pStats.radius.toFixed(1); 
        
        let grade = "C";
        if(friction > 0.998) grade = "S"; else if(friction > 0.996) grade = "A"; else if(friction > 0.994) grade = "B";
        document.getElementById('stat-stamina').innerText = grade;

        // Calculate and display Combat Power (CP)
        // Base Score Logic: Mass(1-6) + Stamina/Friction + Radius
        // Normalize mass: ~300 pts max
        // Normalize stamina: friction range 0.991-0.999 -> 0.008 range. Scale up.
        // Normalize radius: ~1-8
        
        const scoreMass = state.pStats.mass * 150;
        const scoreStamina = (friction - 0.990) * 1000 * 60; // 0.001 diff = 60 pts. Max ~500
        const scoreRadius = state.pStats.radius * 60; // Max ~400
        
        const cp = Math.floor(scoreMass + scoreStamina + scoreRadius);
        
        // Animate CP counter
        const elCP = document.getElementById('stat-cp');
        let currentCP = 0;
        const step = Math.ceil(cp / 30);
        const timer = setInterval(() => {
            currentCP += step;
            if(currentCP >= cp) {
                currentCP = cp;
                clearInterval(timer);
            }
            elCP.innerText = currentCP;
        }, 20);

        switchScreen('screen-level'); AudioSys.init();
    }
    function backToDraw() { switchScreen('screen-draw'); }
    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById('hud').classList.add('hidden'); document.getElementById('launch-overlay').classList.add('hidden'); if(id) document.getElementById(id).classList.remove('hidden'); }

    function createGroupStructure() {
        const root = new THREE.Group();
        const tilt = new THREE.Group();
        const spin = new THREE.Group();
        root.add(tilt); tilt.add(spin);
        return { root, tilt, spin };
    }

    function createPlayerMesh() {
        playerGroups = createGroupStructure();
        const group = playerGroups.spin; 

        const tex = new THREE.CanvasTexture(drawCanvas);
        tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
        
        const sideMat = new THREE.MeshStandardMaterial({ 
            color: state.pColor, emissive: state.pColor, emissiveIntensity: 0.6,
            metalness: 0.3, roughness: 0.1 
        });
        const faceMat = new THREE.MeshStandardMaterial({ 
            map: tex, transparent: true, alphaTest: 0.1, side: THREE.DoubleSide, 
            emissive: 0xffffff, emissiveMap: tex, emissiveIntensity: 0.5 
        });

        const thickness = 1.5; 
        const diskGeo = new THREE.CylinderGeometry(5, 5, thickness, 64); // Smooth cylinder
        const pos = diskGeo.attributes.position; const uv = diskGeo.attributes.uv;
        const materials = [sideMat, faceMat, faceMat];
        
        for (let i=0; i<pos.count; i++) { 
            const y=pos.getY(i); 
            if(Math.abs(y) > thickness/2 - 0.01) { 
                 uv.setXY(i, (pos.getX(i)/10)+0.5, (pos.getZ(i)/10)+0.5); 
            }
        }
        
        const mesh = new THREE.Mesh(diskGeo, materials);
        mesh.position.y = 1.6; 
        const scale = state.pStats.radius / 5 * 2.2; 
        mesh.scale.set(scale, 1, scale); 
        mesh.rotation.y = Math.PI;
        group.add(mesh);

        const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 0.8, 0.8, 32), new THREE.MeshStandardMaterial({ color: 0x222222 })); base.position.y = 0.8; group.add(base);
        const tip = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.1, 0.6, 16), new THREE.MeshStandardMaterial({ color: 0x888888 })); tip.position.y = 0.3; group.add(tip);

        return playerGroups.root;
    }

    function createEnemyMesh(level) {
        enemyGroups = createGroupStructure();
        const group = enemyGroups.spin;

        const tip = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.1, 0.6, 16), new THREE.MeshStandardMaterial({ color: 0x555555 })); tip.position.y = 0.3; group.add(tip);
        const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 0.8, 0.8, 32), new THREE.MeshStandardMaterial({ color: 0x222222 })); base.position.y = 0.8; group.add(base);
        
        const shape = new THREE.Shape();
        const sides = 3 + Math.floor(level/2); const radius = 4.5 + (level * 0.3); 
        for(let i=0; i<sides; i++){ const a=(i/sides)*Math.PI*2; const x=Math.cos(a)*radius; const y=Math.sin(a)*radius; if(i===0)shape.moveTo(x,y); else shape.lineTo(x,y); } shape.closePath();
        
        const layerGeo = new THREE.ExtrudeGeometry(shape, { steps:1, depth:1.5, bevelEnabled:true, bevelThickness:0.2, bevelSize:0.2 }); layerGeo.center();
        const layerMesh = new THREE.Mesh(layerGeo, new THREE.MeshStandardMaterial({ 
            color: 0xff0055, metalness: 0.7, roughness: 0.2, emissive: 0xff0055, emissiveIntensity: 0.8
        }));
        layerMesh.rotation.x = Math.PI/2; layerMesh.position.y = 2.0; group.add(layerMesh);
        return enemyGroups.root;
    }

    function resetSceneForLaunch() {
        if(playerMesh) scene.remove(playerMesh); if(enemyMesh) scene.remove(enemyMesh);
        playerMesh = createPlayerMesh(); scene.add(playerMesh);
        enemyMesh = createEnemyMesh(state.level); scene.add(enemyMesh);
        
        playerGroups.root.position.set(0, 10, 0); playerGroups.root.rotation.set(0,0,0);
        enemyGroups.root.position.set(0, 10, -40); // Spawn further back
        
        barrierMesh.material.opacity = 0.3; 
    }

    function startRound(power) {
        document.getElementById('launch-overlay').classList.add('hidden');
        showMsg("GO SHOOT!", 800, "var(--primary)"); AudioSys.playGo();
        state.screen = 'PLAY'; state.roundStartTime = Date.now();
        objects = [];

        const startDist = 22; // Increased spawn distance for larger arena
        const effectivePower = Math.max(0.4, power); 

        // Player: Positive Spin (Clockwise visual)
        objects.push({ 
            groups: playerGroups, x: -startDist, z: 0, vx: 0.7, vz: 0, 
            mass: state.pStats.mass, radius: state.pStats.radius, 
            friction: state.pStats.friction, 
            isPlayer: true, spin: MAX_SPIN * (0.5 + effectivePower * 0.6) 
        });
        
        // Enemy: Negative Spin (Counter-Clockwise visual)
        // Adjusted base friction to be beatable (e.g., 0.993 base instead of 0.994)
        const eFric = 0.993 + (state.level * 0.0003); 
        objects.push({ 
            groups: enemyGroups, x: startDist, z: 0, vx: -0.7, vz: 0, 
            mass: 2.0 + (state.level * 0.3), radius: 4.5 + (state.level * 0.2), 
            friction: eFric,
            moveSpeed: 0.03 + (state.level * 0.005), 
            isPlayer: false, spin: -MAX_SPIN // OPPOSITE SPIN
        });

        camera.position.set(0, 85, 120); camera.lookAt(0,0,0);
    }

    function getArenaHeight(x, z) {
        const distSq = x*x + z*z;
        if (distSq >= BOWL_RADIUS*BOWL_RADIUS) return BOWL_RADIUS;
        const h = BOWL_RADIUS - Math.sqrt(BOWL_RADIUS*BOWL_RADIUS - distSq);
        return h;
    }

    function physicsStep() {
        if(state.screen !== 'PLAY') return;

        const timeElapsed = Date.now() - state.roundStartTime;
        const safetyPhase = timeElapsed < 1500;
        
        if (safetyPhase) barrierMesh.material.opacity = 0.3;
        else barrierMesh.material.opacity = 0.05;

        objects.forEach((obj, idx) => {
            obj.x += obj.vx; obj.z += obj.vz;
            
            const dist = Math.sqrt(obj.x*obj.x + obj.z*obj.z);
            if(dist > 1) {
                // Steeper gravity for larger arena
                let slope = dist < 12 ? 0.003 : 0.009; 
                slope *= settings.gravity;
                obj.vx -= (obj.x / dist) * slope; obj.vz -= (obj.z / dist) * slope;
            }
            
            if (safetyPhase && dist > (ARENA_RADIUS - 1.5)) {
                const nx = -obj.x / dist; const nz = -obj.z / dist;
                const dot = obj.vx * nx + obj.vz * nz;
                if (dot < 0) {
                    const bounce = settings.restitution; 
                    obj.vx = obj.vx - (1 + bounce) * dot * nx;
                    obj.vz = obj.vz - (1 + bounce) * dot * nz;
                    obj.x += nx * 0.5; obj.z += nz * 0.5;
                    AudioSys.playWall(); createSparks(obj.x + nx*2, obj.z + nz*2);
                }
            }

            // Use ABS spin for decay check, keep sign for physics direction
            const spinMag = Math.abs(obj.spin);
            if(spinMag < 0.05) roundOver(obj.isPlayer ? 'LOSE' : 'WIN', 'SPIN');
            
            obj.vx *= obj.friction; obj.vz *= obj.friction;
            obj.spin *= obj.friction; // Decay maintains sign

            // --- Visual Position with Height & Tilt Correction ---
            const floorY = getArenaHeight(obj.x, obj.z);

            const maxTilt = 0.6;
            const targetTiltX = Math.max(-maxTilt, Math.min(maxTilt, obj.vz * 0.6)); 
            const targetTiltZ = Math.max(-maxTilt, Math.min(maxTilt, -obj.vx * 0.6));
            
            let wobbleX = 0, wobbleZ = 0;
            if(spinMag < 0.3) {
                const t = Date.now() * 0.015;
                const wobbleAmt = (0.3 - spinMag) * 2.0;
                wobbleX = Math.sin(t) * wobbleAmt; wobbleZ = Math.cos(t) * wobbleAmt;
            }

            const currentTiltX = targetTiltX + wobbleX;
            const currentTiltZ = targetTiltZ + wobbleZ;
            
            const tiltMag = Math.sqrt(currentTiltX*currentTiltX + currentTiltZ*currentTiltZ);
            const tiltLift = Math.max(0, tiltMag * obj.radius * 0.6 - 0.5); 

            // FIX: Sinking the model slightly (-0.6) to prevent floating look
            obj.groups.root.position.set(obj.x, floorY + tiltLift - 0.6, obj.z);
            
            // Rotation Visual: Minus spin means:
            // If spin > 0 (Player): Rot.y decreases (CW visual)
            // If spin < 0 (Enemy): Rot.y increases (CCW visual)
            obj.groups.spin.rotation.y -= obj.spin; 
            obj.groups.tilt.rotation.x = currentTiltX;
            obj.groups.tilt.rotation.z = currentTiltZ;
        });

        const p = objects[0], e = objects[1];
        const dx = p.x - e.x, dz = p.z - e.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        const hitDist = p.radius + e.radius;

        if(dist > hitDist) {
            // AI Follow: Use abs spin for "alive" check strength
            const aiForce = e.moveSpeed * 0.7 * (Math.abs(e.spin) / MAX_SPIN);
            e.vx += (dx/dist) * aiForce; e.vz += (dz/dist) * aiForce;
        } else {
            const nx = dx / dist, nz = dz / dist;
            const rvx = p.vx - e.vx, rvz = p.vz - e.vz;
            const impact = rvx * nx + rvz * nz;

            if (impact < 0) {
                createSparks((p.x+e.x)/2, (p.z+e.z)/2);
                AudioSys.playHit(Math.abs(impact));

                const impulse = -(1 + settings.restitution) * impact * settings.forceMult;
                const pRatio = e.mass / (p.mass + e.mass);
                const eRatio = p.mass / (p.mass + e.mass);
                
                // Spin collision transfer? simplified kick
                const kick = 0.3 * (Math.abs(p.spin) + Math.abs(e.spin));

                p.vx += (impulse * pRatio * nx) + (Math.random()-0.5)*kick;
                p.vz += (impulse * pRatio * nz) + (Math.random()-0.5)*kick;
                e.vx -= (impulse * eRatio * nx) + (Math.random()-0.5)*kick;
                e.vz -= (impulse * eRatio * nz) + (Math.random()-0.5)*kick;
                
                // Collision spin loss
                p.spin *= 0.96; e.spin *= 0.96;
                shakeCamera(1.5 * Math.abs(impact));
            }
        }

        if (!safetyPhase) {
            const limit = ARENA_RADIUS + 4; 
            if(distFromCenter(p) > limit) roundOver('LOSE', 'RING');
            else if(distFromCenter(e) > limit) roundOver('WIN', 'RING');
        }
    }

    function distFromCenter(obj) { return Math.sqrt(obj.x*obj.x + obj.z*obj.z); }

    function roundOver(result, type) {
        if (state.screen === 'WAIT') return;
        state.screen = 'WAIT';
        let subText = "";
        if (type === 'SPIN') subText = result === 'WIN' ? "對手停止旋轉 (Spin Finish)" : "旋轉力耗盡 (Spin Finish)";
        else subText = result === 'WIN' ? "擊飛對手 (Over Finish)" : "被擊出場外 (Over Finish)";
        if(result === 'WIN') { showMsg("VICTORY", 1500, "var(--primary)"); AudioSys.playWin(); createConfetti(); }
        else { showMsg("DEFEAT", 1500, "var(--secondary)"); AudioSys.playLose(); }
        setTimeout(() => matchOver(result === 'WIN', subText), 2000);
    }

    function matchOver(playerWon, reason) {
        switchScreen('screen-result');
        const title = document.getElementById('result-title'); const sub = document.getElementById('result-sub');
        if(playerWon) { title.innerText = "WINNER"; title.style.color = "var(--primary)"; }
        else { title.innerText = "LOSER"; title.style.color = "var(--secondary)"; }
        sub.innerText = reason;
    }

    function createSparks(x, z) {
        for(let i=0; i<8; i++) {
            const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2); const mat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
            const mesh = new THREE.Mesh(geo, mat); mesh.position.set(x, 1, z);
            const angle = Math.random()*Math.PI*2; const spd = Math.random()*0.6+0.2;
            particles.push({ mesh: mesh, vx: Math.cos(angle)*spd, vy: Math.random()*0.5+0.2, vz: Math.sin(angle)*spd, life: 1.0 });
            scene.add(mesh);
        }
    }
    function updateParticles() {
        for(let i=particles.length-1; i>=0; i--) {
            const p = particles[i]; p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
            p.vy -= 0.03; p.life -= 0.05; p.mesh.scale.setScalar(p.life);
            if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
        }
    }
    function shakeCamera(intensity = 1.0) { camera.position.x += (Math.random()-0.5)*intensity; camera.position.z += (Math.random()-0.5)*intensity; }
    function showMsg(t, d, c) { const el = document.getElementById('msg-overlay'); el.innerText = t; el.style.color = c; el.style.opacity = 1; if(d) setTimeout(() => el.style.opacity = 0, d); }
    function createConfetti() { createSparks(0,0); createSparks(3,3); createSparks(-3,-3); }

    function animate() {
        requestAnimationFrame(animate); physicsStep(); updateParticles();
        
        if(state.screen === 'PLAY' || state.screen === 'WAIT') {
            const cx = (objects[0]?.x + objects[1]?.x)/2 || 0; const cz = (objects[0]?.z + objects[1]?.z)/2 || 0;
            camera.position.x += (cx*0.5 - camera.position.x) * 0.05; camera.position.z += ((cz*0.5 + 40) - camera.position.z) * 0.05; camera.lookAt(cx, 0, cz);
        } else if (state.screen === 'DRAW' || state.screen === 'LEVEL') {
            const t = Date.now()*0.0002; camera.position.x = Math.sin(t)*60; camera.position.z = Math.cos(t)*60; camera.lookAt(0,0,0);
            if(playerGroups.root) playerGroups.spin.rotation.y -= 0.1;
            if(enemyGroups.root) enemyGroups.spin.rotation.y -= 0.1;
        }
        renderer.render(scene, camera);
    }
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
